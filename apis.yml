aid: covance
name: Covance (Fortrea)
x-type: company
description: >-
  Covance was a contract research organization (CRO) acquired by Labcorp in 2015
  and rebranded as Labcorp Drug Development in 2021. In 2023, the clinical
  development business was spun off as Fortrea, an independent CRO headquartered
  in Durham, North Carolina, operating in 90+ countries and serving the
  pharmaceutical, biotechnology, and medical device industries with clinical
  trial management, central laboratory, and bioanalytical services. No public
  API or developer portal is currently published; integrations are arranged
  through sponsor and partner agreements.
